<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16X19 — Frame × String × Tension Prediction Engine</title>
<meta name="description" content="High-spec tennis telemetry. 16X19 is a parametric prediction engine for frame, string, and tension optimization.">

<meta property="og:title" content="16X19 // Prediction Engine">
<meta property="og:description" content="Diagnostic-grade tennis equipment analysis. Optimize your loadout with the 16X19 telemetry suite.">
<meta property="og:image" content="/og-preview.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/terminal-square-svgrepo-com.svg">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: ['selector', '[data-theme="dark"]'],
    theme: {
      extend: {
        colors: {
          /* Theme tokens — values come from style.css :root / [data-theme="light"] */
          'dc-void': 'var(--dc-void)',
          'dc-void-deep': 'var(--dc-void-deep)',
          'dc-void-lift': 'var(--dc-void-lift)',
          'dc-storm': 'var(--dc-storm)',
          'dc-storm-light': 'var(--dc-storm-light)',
          'dc-platinum': 'var(--dc-platinum)',
          'dc-platinum-dim': 'var(--dc-platinum-dim)',
          'dc-white': 'var(--dc-white)',
          'dc-border': 'var(--dc-border)',
          'dc-border-hover': 'var(--dc-border-hover)',
          'dc-active-bg': 'var(--dc-active-bg)',
          'dc-active-text': 'var(--dc-active-text)',
          /* Fixed — strong brand / on-accent contrast in both themes */
          'dc-accent': '#FF4500',
          'dc-red': '#AF0000',
          'dc-ink': '#141414',
        },
        fontFamily: {
          sans: ['Inter', '-apple-system', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'SF Mono', 'Fira Code', 'monospace'],
        },
        fontSize: {
          'hero': 'clamp(2.8rem, 5vw, 4.5rem)',
          'obs': 'clamp(2.5rem, 4vw, 3.5rem)',
          'mouse': '9px',
          'micro': '8px',
        },
        letterSpacing: {
          'mouse': '0.18em',
          'tight-hero': '-0.045em',
        },
        borderColor: {
          'ghost': 'rgba(150, 150, 150, 0.15)',
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
