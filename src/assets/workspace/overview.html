      <section class="workspace-mode" id="mode-overview" data-mode="overview">
        <!-- Mobile saved loadout switcher pills (rendered by renderMobileLoadoutPills) -->
        <div id="mobile-loadout-pills" class="mobile-loadout-pills"></div>
        <div id="empty-state" class="flex flex-col items-center justify-center min-h-[75vh] w-full px-4 md:px-8">
          <div class="w-full max-w-4xl flex flex-col gap-12 relative">

            <!-- Header -->
            <div class="flex flex-col gap-2">
              <span class="font-mono text-[10px] text-dc-accent uppercase tracking-[0.2em] flex items-center gap-2">
                <span class="w-2 h-2 bg-dc-accent animate-pulse"></span> AWAITING TELEMETRY
              </span>
              <h2 class="text-5xl md:text-6xl font-semibold tracking-tighter text-dc-platinum leading-none">Initialize Loadout.</h2>
            </div>

            <!-- Search Input -->
            <div class="relative w-full group">
              <div class="flex items-center bg-transparent border border-dc-border focus-within:border-dc-accent transition-colors">
                <div class="pl-6 text-dc-storm group-focus-within:text-dc-accent transition-colors">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </div>
                <input type="text" class="w-full bg-transparent border-none text-2xl md:text-3xl font-mono text-dc-platinum placeholder:text-dc-storm/40 py-6 px-6 outline-none" id="landing-search" placeholder="Enter frame designation..." autocomplete="off">
              </div>
              <div class="hidden absolute top-full left-0 w-full bg-dc-void border border-dc-border mt-2 z-50 shadow-2xl max-h-96 overflow-y-auto" id="landing-search-dropdown"></div>
              <div class="flex gap-4 mt-4 font-mono text-[9px] text-dc-storm uppercase tracking-widest">
                <span>Targets:</span>
                <span class="text-dc-platinum hover:text-dc-accent cursor-pointer transition-colors" onclick="document.getElementById('landing-search').value='Pure Aero 98'; document.getElementById('landing-search').dispatchEvent(new Event('input'))">Pure Aero 98</span>
                <span class="text-dc-platinum hover:text-dc-accent cursor-pointer transition-colors" onclick="document.getElementById('landing-search').value='Blade 98'; document.getElementById('landing-search').dispatchEvent(new Event('input'))">Blade 98</span>
                <span class="text-dc-platinum hover:text-dc-accent cursor-pointer transition-colors" onclick="document.getElementById('landing-search').value='Ezone 100'; document.getElementById('landing-search').dispatchEvent(new Event('input'))">Ezone 100</span>
              </div>
            </div>

            <!-- Divider -->
            <div class="flex items-center gap-4 w-full opacity-60">
              <div class="h-[1px] bg-dc-border flex-1"></div>
              <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.3em]">OR RUN DIAGNOSTIC</span>
              <div class="h-[1px] bg-dc-border flex-1"></div>
            </div>

            <!-- Find My Build CTA -->
            <button class="group w-full flex flex-col md:flex-row items-start md:items-center justify-between gap-6 p-8 bg-transparent border border-dc-border hover:border-dc-platinum transition-all cursor-pointer text-left" id="fmb-cta" onclick="openFindMyBuild()">
              <div class="flex items-start gap-6">
                <div class="mt-1 w-10 h-10 border border-dc-storm group-hover:border-dc-platinum flex items-center justify-center text-dc-storm group-hover:text-dc-void group-hover:bg-dc-platinum transition-colors">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div class="flex flex-col gap-2">
                  <span class="text-2xl font-semibold text-dc-platinum tracking-tight group-hover:translate-x-1 transition-transform">Find My Build Algorithm</span>
                  <span class="font-mono text-[11px] text-dc-storm uppercase tracking-widest">Execute 5-step player profile calibration</span>
                </div>
              </div>
              <div class="text-dc-storm group-hover:text-dc-platinum transition-colors md:group-hover:translate-x-2 duration-300 hidden md:block">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </div>
            </button>

          </div>
        </div>

        <!-- Find My Build Wizard -->
        <div id="find-my-build" class="fmb-wizard hidden">
          <div class="fmb-progress"><div class="fmb-progress-fill" id="fmb-progress-fill" style="width:20%"></div></div>

          <div class="fmb-header">
            <button class="fmb-close" id="fmb-close" onclick="closeFindMyBuild()" title="Close">&times;</button>
          </div>

          <!-- Step 1: Swing Style -->
          <div class="fmb-step" data-step="1" id="fmb-step-1">
            <h3 class="fmb-question">How would you describe your swing?</h3>
            <div class="fmb-options" data-key="swing">
              <button class="fmb-option" data-value="compact">
                <span class="fmb-option-title">Compact &amp; Quick</span>
                <span class="fmb-option-desc">Short take-back, fast hands, values maneuverability</span>
              </button>
              <button class="fmb-option" data-value="smooth">
                <span class="fmb-option-title">Full &amp; Smooth</span>
                <span class="fmb-option-desc">Medium swing, balanced tempo, all-around strokes</span>
              </button>
              <button class="fmb-option" data-value="heavy">
                <span class="fmb-option-title">Long &amp; Heavy</span>
                <span class="fmb-option-desc">Big take-back, heavy ball, wants stability and plow-through</span>
              </button>
            </div>
          </div>

          <!-- Step 2: Ball Shape -->
          <div class="fmb-step hidden" data-step="2" id="fmb-step-2">
            <h3 class="fmb-question">What does your ball look like?</h3>
            <div class="fmb-options" data-key="ball">
              <button class="fmb-option" data-value="flat">
                <span class="fmb-option-title">Flat / Drive</span>
                <span class="fmb-option-desc">Low spin, emphasizes control and raw power</span>
              </button>
              <button class="fmb-option" data-value="moderate">
                <span class="fmb-option-title">Moderate Topspin</span>
                <span class="fmb-option-desc">Balanced spin, all-court versatility</span>
              </button>
              <button class="fmb-option" data-value="heavy">
                <span class="fmb-option-title">Heavy Topspin</span>
                <span class="fmb-option-desc">High spin, shaped shots, big kick serve</span>
              </button>
            </div>
          </div>

          <!-- Step 3: Court Identity -->
          <div class="fmb-step hidden" data-step="3" id="fmb-step-3">
            <h3 class="fmb-question">What's your court identity?</h3>
            <div class="fmb-options" data-key="court">
              <button class="fmb-option" data-value="baseliner">
                <span class="fmb-option-title">Baseliner</span>
                <span class="fmb-option-desc">Stays back, rallies, grinds out consistency</span>
              </button>
              <button class="fmb-option" data-value="allcourt">
                <span class="fmb-option-title">All-Court</span>
                <span class="fmb-option-desc">Mixes baseline with net play, values variety</span>
              </button>
              <button class="fmb-option" data-value="firststrike">
                <span class="fmb-option-title">First-Strike</span>
                <span class="fmb-option-desc">Aggressive, takes ball early, ends points fast</span>
              </button>
              <button class="fmb-option" data-value="touch">
                <span class="fmb-option-title">Touch Player</span>
                <span class="fmb-option-desc">Net play, slice, drop shots &mdash; feel is everything</span>
              </button>
            </div>
          </div>

          <!-- Step 4: Pain Points (multi-select, up to 2) -->
          <div class="fmb-step hidden" data-step="4" id="fmb-step-4">
            <h3 class="fmb-question">Main pain points? <span class="fmb-hint">Pick up to 2</span></h3>
            <div class="fmb-options fmb-options-multi" data-key="painPoints" data-max="2">
              <button class="fmb-option" data-value="arm">
                <span class="fmb-option-title">Arm / Elbow Discomfort</span>
                <span class="fmb-option-desc">Need a comfortable, arm-friendly setup</span>
              </button>
              <button class="fmb-option" data-value="breaks">
                <span class="fmb-option-title">Strings Break Too Fast</span>
                <span class="fmb-option-desc">Need durability without sacrificing performance</span>
              </button>
              <button class="fmb-option" data-value="long">
                <span class="fmb-option-title">Ball Flies Long</span>
                <span class="fmb-option-desc">Need more control and a lower launch angle</span>
              </button>
              <button class="fmb-option" data-value="pace">
                <span class="fmb-option-title">Not Enough Pace</span>
                <span class="fmb-option-desc">Need more free power from the string bed</span>
              </button>
              <button class="fmb-option" data-value="spin">
                <span class="fmb-option-title">Can't Generate Spin</span>
                <span class="fmb-option-desc">Need more bite and ball rotation</span>
              </button>
              <button class="fmb-option" data-value="dead">
                <span class="fmb-option-title">Racquet Feels Dead</span>
                <span class="fmb-option-desc">Need better feel and playability</span>
              </button>
            </div>
          </div>

          <!-- Step 5: Priorities (multi-select, top 3) -->
          <div class="fmb-step hidden" data-step="5" id="fmb-step-5">
            <h3 class="fmb-question">Top 3 priorities? <span class="fmb-hint">Select in order of importance</span></h3>
            <div class="fmb-options fmb-options-multi fmb-options-priority" data-key="priorities" data-max="3">
              <button class="fmb-option" data-value="control">
                <span class="fmb-option-title">Control</span>
                <span class="fmb-option-desc">Placement accuracy, directional precision</span>
              </button>
              <button class="fmb-option" data-value="spin">
                <span class="fmb-option-title">Spin</span>
                <span class="fmb-option-desc">Ball rotation, kick, and shape</span>
              </button>
              <button class="fmb-option" data-value="power">
                <span class="fmb-option-title">Power</span>
                <span class="fmb-option-desc">Pace and depth from the string bed</span>
              </button>
              <button class="fmb-option" data-value="comfort">
                <span class="fmb-option-title">Comfort</span>
                <span class="fmb-option-desc">Arm-friendliness, vibration dampening</span>
              </button>
              <button class="fmb-option" data-value="feel">
                <span class="fmb-option-title">Feel</span>
                <span class="fmb-option-desc">Touch, feedback, connection to the ball</span>
              </button>
              <button class="fmb-option" data-value="durability">
                <span class="fmb-option-title">Durability</span>
                <span class="fmb-option-desc">String longevity and tension maintenance</span>
              </button>
              <button class="fmb-option" data-value="stability">
                <span class="fmb-option-title">Stability</span>
                <span class="fmb-option-desc">Frame stability, plow-through, twist resistance</span>
              </button>
            </div>
          </div>

          <!-- Result Bridge -->
          <div class="fmb-step hidden" data-step="result" id="fmb-result">
            <div class="fmb-summary" id="fmb-summary"></div>
            <div class="fmb-directions" id="fmb-directions"></div>
          </div>

          <!-- Navigation -->
          <div class="fmb-nav">
            <button class="fmb-back" id="fmb-back" onclick="fmbBack()">Back</button>
            <button class="fmb-next" id="fmb-next" onclick="fmbNext()">Next</button>
          </div>
        </div>

        <div id="dashboard-content" class="dashboard-content hidden">
          <!-- Hero Band -->
          <div class="w-full" id="overview-hero"></div>

          <!-- Build DNA (unified stats + radar + fit) -->
          <div class="bg-white dark:bg-dc-void-lift border border-dc-border rounded-lg p-8 md:p-5 relative overflow-hidden shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]">
            <div class="grid grid-cols-1 lg:grid-cols-[1.2fr_1fr] gap-6 lg:gap-8 items-start">
              <div class="flex flex-col gap-2">
                <div id="stat-bars"></div>
                <div class="pt-4 mt-4 border-t border-dc-border" id="build-dna-highlights"></div>
              </div>
              <div class="flex flex-col justify-between h-full items-center">
                <div class="relative w-full flex items-center justify-center">
                  <canvas id="radar-chart"></canvas>
                </div>
                <div class="w-full bg-black/5 dark:bg-black/20 border border-black/10 dark:border-white/5 rounded-md p-3 px-4" id="oc-foundation"></div>
              </div>
            </div>
            <div class="mt-6 p-4 border border-dc-border bg-black/[0.02] dark:bg-black/20" id="fit-grid"></div>
          </div>

          <!-- Warnings -->
          <div class="card warnings-card hidden" id="warnings-card">
            <div class="card-header">
              <h3 class="card-title warning-title">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L1 14h14L8 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><line x1="8" y1="6" x2="8" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="12" r="0.8" fill="currentColor"/></svg>
                Warnings
              </h3>
            </div>
            <div class="warnings-list" id="warnings-list"></div>
          </div>
        </div>
      </section>
