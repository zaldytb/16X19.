      <section class="workspace-mode" id="mode-tune" data-mode="tune">
        <div class="p-6">
          <div class="flex items-start justify-between mb-6 pb-4 border-b border-dc-border">
            <div class="flex flex-col gap-1">
              <h2 class="font-mono text-[11px] font-bold tracking-[0.2em] text-dc-platinum uppercase">Tension tuning</h2>
              <p class="text-[13px] text-dc-storm font-normal leading-tight" id="tune-subtitle">— Select a setup to begin tuning</p>
            </div>
          </div>

          <!-- Empty state when no setup -->
          <div class="text-center py-16 text-dc-storm text-sm" id="tune-empty">
            <p>Configure a frame and string, then explore tension tradeoffs.</p>
          </div>

          <!-- Active tune panels -->
          <div class="flex flex-col gap-5 hidden" id="tune-panels">
            <!-- Zone 1: OBS + Slider (always visible, side by side) -->
            <div class="mb-4 grid grid-cols-1 md:grid-cols-[1fr_1.6fr] gap-4 items-stretch">
              <div class="tune-card bg-white dark:bg-dc-void-lift border border-dc-border rounded-lg hover:border-dc-storm transition-colors duration-200" id="tune-card-obs">
                <div class="flex items-center px-0.5 py-4 border-b border-dc-border">
                  <h3 class="tune-card-title font-mono text-[11px] font-bold tracking-[0.15em] text-dc-platinum uppercase">Build score</h3>
                </div>
                <div class="obs-content px-0.5" id="obs-content"></div>
                <button class="tune-apply-btn hidden" id="tune-apply-btn" onclick="tuneSandboxCommit()">Apply changes</button>
                <div class="optimal-content" id="optimal-content"></div>
              </div>
              <div class="tune-card bg-white dark:bg-dc-void-lift border border-dc-border rounded-lg hover:border-dc-storm transition-colors duration-200" id="tune-card-slider">
                <div class="flex items-center justify-between px-0.5 py-4 border-b border-dc-border">
                  <h3 class="tune-card-title font-mono text-[11px] font-bold tracking-[0.15em] text-dc-platinum uppercase">Tension explorer</h3>
                  <div class="tune-hybrid-toggle" id="tune-hybrid-toggle"></div>
                </div>
                <div class="slider-content px-0.5" id="slider-content">
                  <div class="slider-track-wrapper">
                    <div class="slider-labels">
                      <span class="slider-label-min" id="slider-label-min">40</span>
                      <span class="slider-label-max" id="slider-label-max">70</span>
                    </div>
                    <div class="slider-track" id="slider-track">
                      <div class="slider-optimal-zone" id="slider-optimal-zone"></div>
                      <div class="slider-baseline-marker" id="slider-baseline-marker"></div>
                      <input type="range" class="tune-slider" id="tune-slider" min="40" max="70" step="1" value="55">
                    </div>
                    <div class="slider-value-display">
                      <span class="slider-current-label">Exploring</span>
                      <span class="slider-current-value" id="slider-current-value">55 lbs</span>
                    </div>
                  </div>
                  <div class="slider-best-value" id="slider-best-value"></div>
                </div>
              </div>
            </div>

            <!-- Zone 2: Chart + Delta/WTTN -->
            <div class="mb-4">
              <div class="tune-card bg-white dark:bg-dc-void-lift border border-dc-border rounded-lg hover:border-dc-storm transition-colors duration-200 mb-4" id="tune-card-chart">
                <div class="flex items-center px-0.5 py-4 border-b border-dc-border">
                  <h3 class="tune-card-title font-mono text-[11px] font-bold tracking-[0.15em] text-dc-platinum uppercase">Response across tension</h3>
                </div>
                <div class="sweep-chart-container px-0.5">
                  <canvas id="sweep-chart"></canvas>
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="tune-card bg-white dark:bg-dc-void-lift border border-dc-border rounded-lg hover:border-dc-storm transition-colors duration-200" id="tune-card-delta">
                  <div class="flex items-center px-0.5 py-4 border-b border-dc-border">
                    <h3 class="tune-card-title font-mono text-[11px] font-bold tracking-[0.15em] text-dc-platinum uppercase">Delta vs baseline</h3>
                  </div>
                  <div class="delta-content px-0.5" id="delta-content"></div>
                </div>
                <div class="tune-card bg-white dark:bg-dc-void-lift border border-dc-border rounded-lg hover:border-dc-storm transition-colors duration-200" id="tune-card-wttn">
                  <div class="flex items-center px-3 py-4 border-b border-dc-border">
                    <h3 class="tune-card-title font-mono text-[11px] font-bold tracking-[0.15em] text-dc-platinum uppercase">What to try next</h3>
                  </div>
                  <div class="wttn-content px-3 overflow-x-auto" id="wttn-content"></div>
                </div>
              </div>
            </div>

            <!-- Zone 3: Collapsed depth -->
            <details class="bg-white dark:bg-dc-void-lift border border-dc-border rounded-lg shadow-[inset_0_1px_0_rgba(255,255,255,0.03)] overflow-hidden mb-4" id="tune-details-recs">
              <summary class="flex items-center gap-3 px-0.5 py-4 cursor-pointer font-mono text-[11px] font-semibold text-dc-storm dark:text-dc-platinum tracking-[0.1em] uppercase select-none hover:text-dc-platinum dark:hover:text-dc-white transition-colors duration-200 list-none [&::-webkit-details-marker]:hidden">
                <svg class="w-3.5 h-3.5" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Recommended builds
              </summary>
              <div class="tune-card border-0 rounded-none shadow-none" id="tune-card-recs">
                <div class="recs-content px-0.5" id="recs-content"></div>
              </div>
            </details>

            <details class="bg-white dark:bg-dc-void-lift border border-dc-border rounded-lg shadow-[inset_0_1px_0_rgba(255,255,255,0.03)] overflow-hidden mb-4" id="tune-details-gauge">
              <summary class="flex items-center gap-3 px-0.5 py-4 cursor-pointer font-mono text-[11px] font-semibold text-dc-storm dark:text-dc-platinum tracking-[0.1em] uppercase select-none hover:text-dc-platinum dark:hover:text-dc-white transition-colors duration-200 list-none [&::-webkit-details-marker]:hidden">
                <svg class="w-3.5 h-3.5" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Gauge explorer
              </summary>
              <div class="tune-card border-0 rounded-none shadow-none" id="tune-card-gauge">
                <div class="gauge-explore-content px-0.5" id="gauge-explore-content"></div>
              </div>
            </details>

            <div class="hidden" id="tune-row-explore">
              <div class="tune-card bg-white dark:bg-dc-void-lift border border-dc-border rounded-lg hover:border-dc-storm transition-colors duration-200" id="tune-card-explore">
                <div class="explore-content px-0.5" id="explore-content"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
